<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta content="width=550px,width-scale=550px"name="viewport">
  <title>TOPUPSKUY - APP PREMIUM, TOPUP GAME, EWALLET, AND MORE!!</title>

  <!-- SEO & Social -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://topupskuy.github.io/payment" />
  <meta property="og:title" content="TOPUPSKUY - App Premium, Topup Game, eWallet, dan Lainnya!" />
  <meta property="og:description" content="Topup cepat & murah untuk game, eWallet, hingga layanan app premium. Mudah, aman, 24/7." />
  <meta property="og:image" content="https://hisoka.net/file/IMG_20250826_083458-1761413991.png" />
  <meta name="twitter:card" content="summary_large_image" />

  <style>
    :root {
      --green-main: #00c853;
      --green-dark: #047a3c;
      --green-soft: #eafff1;
      --green-light: #b9ffd3;
      --text-dark: #123322;
      --white: #ffffff;
      --black: #0b0b0b;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #0b0b0b;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      overflow: hidden;
    }

    body {
      position: relative;
    }

    /* ================= MAIN IFRAMES ================= */

    #mainWrap {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
      z-index: 1;
      background: #0b0b0b;
    }

    #mainFrameTop,
    #mainFrameBottom {
      flex: 1;
      width: 100%;
      border: none;
      background: #ffffff;
    }

    /* ================= PAYMENT POPUP IFRAME ================= */

    #popupWrap {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.94);
      padding: 0.5px;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.35s ease, visibility 0.35s ease;
    }

    #popupWrap.is-active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    #popupFrame {
      width: 100%;
      height: 100%;
      border: none;
      background: #f4f4f4;
    }

    /* ================= CANVAS FX ================= */

    #pileCanvas,
    #fxCanvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2000;
    }

    /* ================= START REMINDER POPUP ================= */

    #startReminder {
      position: fixed;
      inset: 0;
      z-index: 5000;
      display: grid;
      place-items: center;
      padding: 22px;
      background:
        radial-gradient(circle at 20% 20%, rgba(0, 255, 123, 0.25), transparent 28%),
        radial-gradient(circle at 80% 15%, rgba(185, 255, 211, 0.35), transparent 26%),
        radial-gradient(circle at 50% 100%, rgba(0, 200, 83, 0.28), transparent 35%),
        linear-gradient(145deg, #eafff1 0%, #ffffff 42%, #d9ffe7 100%);
      transition: opacity 0.35s ease, visibility 0.35s ease, transform 0.35s ease;
    }

    #startReminder.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: scale(1.02);
    }

    .reminder-card {
      position: relative;
      width: min(440px, 100%);
      padding: 26px 22px 24px;
      border-radius: 30px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.98), rgba(237,255,244,0.98));
      border: 1px solid rgba(0, 200, 83, 0.28);
      box-shadow:
        0 24px 70px rgba(0, 90, 42, 0.22),
        inset 0 1px 0 rgba(255,255,255,0.8);
      overflow: hidden;
      animation: cardPop 0.55s cubic-bezier(.2,.9,.2,1) both;
    }

    .reminder-card::before {
      content: "";
      position: absolute;
      inset: -2px;
      background:
        radial-gradient(circle at 15% 15%, rgba(0, 200, 83, 0.18), transparent 23%),
        radial-gradient(circle at 90% 10%, rgba(0, 255, 123, 0.16), transparent 24%),
        radial-gradient(circle at 50% 110%, rgba(0, 200, 83, 0.16), transparent 30%);
      pointer-events: none;
    }

    .reminder-card::after {
      content: "";
      position: absolute;
      top: -70px;
      left: -90px;
      width: 180px;
      height: 180px;
      border-radius: 999px;
      background: rgba(0, 200, 83, 0.12);
      animation: floatBubble 5s ease-in-out infinite;
      pointer-events: none;
    }

    .cute-badge {
      position: relative;
      z-index: 1;
      width: 76px;
      height: 76px;
      margin: 0 auto 14px;
      border-radius: 26px;
      display: grid;
      place-items: center;
      background:
        linear-gradient(145deg, #00e676, #00b84f);
      color: #ffffff;
      font-size: 36px;
      box-shadow:
        0 14px 30px rgba(0, 200, 83, 0.35),
        inset 0 1px 0 rgba(255,255,255,0.35);
      animation: softBounce 2.4s ease-in-out infinite;
    }

    .cute-badge span {
      display: block;
      transform: translateY(-1px);
    }

    .reminder-title {
      position: relative;
      z-index: 1;
      margin: 0;
      color: var(--text-dark);
      font-size: 25px;
      line-height: 1.12;
      text-align: center;
      font-weight: 900;
      letter-spacing: -0.5px;
    }

    .reminder-subtitle {
      position: relative;
      z-index: 1;
      margin: 8px 0 18px;
      color: #0c6d38;
      text-align: center;
      font-size: 16px;
      line-height: 1.45;
      font-weight: 800;
    }

    .reminder-box {
      position: relative;
      z-index: 1;
      padding: 16px;
      border-radius: 22px;
      background: rgba(234, 255, 241, 0.9);
      border: 1px solid rgba(0, 200, 83, 0.20);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
    }

    .reminder-main {
      margin: 0;
      color: #0d3f25;
      font-size: 19px;
      line-height: 1.35;
      text-align: center;
      font-weight: 900;
    }

    .reminder-note {
      margin: 10px 0 0;
      color: #315845;
      font-size: 14px;
      line-height: 1.55;
      text-align: center;
      font-weight: 650;
    }

    .reminder-note strong {
      color: #008b42;
      font-weight: 900;
    }

    #startBtn {
      position: relative;
      z-index: 1;
      width: 100%;
      margin-top: 18px;
      border: none;
      outline: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 15px 18px;
      background:
        linear-gradient(135deg, #00e676 0%, #00c853 45%, #00a344 100%);
      color: #ffffff;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 0.1px;
      box-shadow:
        0 14px 28px rgba(0, 200, 83, 0.32),
        inset 0 1px 0 rgba(255,255,255,0.35);
      transition:
        transform 0.18s ease,
        box-shadow 0.18s ease,
        filter 0.18s ease;
      animation: pulseBtn 2.5s ease-in-out infinite;
    }

    #startBtn:hover {
      transform: translateY(-2px);
      filter: brightness(1.04);
      box-shadow:
        0 18px 34px rgba(0, 200, 83, 0.40),
        inset 0 1px 0 rgba(255,255,255,0.35);
    }

    #startBtn:active {
      transform: translateY(1px) scale(0.99);
    }

    .mini-text {
      position: relative;
      z-index: 1;
      margin: 11px 0 0;
      text-align: center;
      color: #5d7d6b;
      font-size: 12px;
      line-height: 1.4;
      font-weight: 600;
    }

    .floating-dot {
      position: absolute;
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: rgba(0, 200, 83, 0.32);
      animation: floatDot 4s ease-in-out infinite;
      pointer-events: none;
    }

    .dot-1 {
      top: 22px;
      right: 34px;
      animation-delay: 0.2s;
    }

    .dot-2 {
      bottom: 82px;
      left: 26px;
      width: 12px;
      height: 12px;
      animation-delay: 0.7s;
    }

    .dot-3 {
      bottom: 28px;
      right: 48px;
      width: 7px;
      height: 7px;
      animation-delay: 1.1s;
    }

    @keyframes cardPop {
      0% {
        opacity: 0;
        transform: translateY(18px) scale(0.96);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes softBounce {
      0%, 100% {
        transform: translateY(0) rotate(-2deg);
      }
      50% {
        transform: translateY(-6px) rotate(2deg);
      }
    }

    @keyframes pulseBtn {
      0%, 100% {
        box-shadow:
          0 14px 28px rgba(0, 200, 83, 0.32),
          0 0 0 0 rgba(0, 200, 83, 0.18),
          inset 0 1px 0 rgba(255,255,255,0.35);
      }
      50% {
        box-shadow:
          0 14px 28px rgba(0, 200, 83, 0.32),
          0 0 0 8px rgba(0, 200, 83, 0),
          inset 0 1px 0 rgba(255,255,255,0.35);
      }
    }

    @keyframes floatBubble {
      0%, 100% {
        transform: translate(0, 0);
      }
      50% {
        transform: translate(14px, 18px);
      }
    }

    @keyframes floatDot {
      0%, 100% {
        transform: translateY(0);
        opacity: 0.65;
      }
      50% {
        transform: translateY(-12px);
        opacity: 1;
      }
    }

    @media (max-width: 480px) {
      .reminder-card {
        padding: 24px 18px 22px;
        border-radius: 27px;
      }

      .cute-badge {
        width: 70px;
        height: 70px;
        border-radius: 24px;
        font-size: 33px;
      }

      .reminder-title {
        font-size: 23px;
      }

      .reminder-subtitle {
        font-size: 15px;
      }

      .reminder-main {
        font-size: 18px;
      }

      .reminder-note {
        font-size: 13.5px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>

<body>

  <!-- CANVAS FX -->
  <canvas id="pileCanvas"></canvas>
  <canvas id="fxCanvas"></canvas>

  <!-- MAIN IFRAMES: src sengaja kosong dulu -->
  <div id="mainWrap">
    <iframe id="mainFrameTop" title="Main Frame Top"></iframe>
    <iframe id="mainFrameBottom" title="Main Frame Bottom"></iframe>
  </div>

  <!-- POPUP PAYMENT: src sengaja kosong dulu -->
  <div id="popupWrap">
    <iframe id="popupFrame" title="TOPUPSKUY Store"></iframe>
  </div>

  <!-- POPUP REMINDER AWAL -->
  <div id="startReminder" role="dialog" aria-modal="true" aria-labelledby="reminderTitle">
    <div class="reminder-card">
      <span class="floating-dot dot-1"></span>
      <span class="floating-dot dot-2"></span>
      <span class="floating-dot dot-3"></span>

      <div class="cute-badge" aria-hidden="true">
        <span>📗</span>
      </div>

      <h1 class="reminder-title" id="reminderTitle">
        Membeli disini harus wajib baca!
      </h1>

      <p class="reminder-subtitle">
        Malas baca? Jangan beli disini 🙏
      </p>

      <div class="reminder-box">
        <p class="reminder-main">
          Membeli = Memahami!
        </p>

        <p class="reminder-note">
          Tidak ada garansi buat yang melanggar <strong>SNK produk</strong>.<br>
          Harap baca halaman <strong>SNK</strong> sebelum membeli.
        </p>
      </div>

      <button id="startBtn" type="button">
        Saya mengerti!
      </button>

      <p class="mini-text">
        Dengan lanjut, kamu dianggap sudah memahami ketentuan produk.
      </p>
    </div>
  </div>

<script>
/* ================= CONFIG ================= */

const mainUrls = [
  "https://taxdifferenceinvestor.com/v3tk1fgk5d?key=14406e5eb5e6ef18d9975e065b45235b",
  "https://taxdifferenceinvestor.com/ep583c2e?key=c9cfe32d2e808e9d5664a9b7ee698919"
];

const STORE_URL = "https://topupskuy.store";

/*
  Refresh acak dalam rentang 40-60 detik.
  Nilai dalam milidetik.
*/
const REFRESH_MIN = 40000;
const REFRESH_MAX = 60000;

/* ================= ELEMENTS ================= */

const topFrame = document.getElementById("mainFrameTop");
const bottomFrame = document.getElementById("mainFrameBottom");
const popupWrap = document.getElementById("popupWrap");
const popupFrame = document.getElementById("popupFrame");
const startReminder = document.getElementById("startReminder");
const startBtn = document.getElementById("startBtn");

let hasStarted = false;
let topIndex = 0;
let bottomIndex = 1;
let topTimer = null;
let bottomTimer = null;

/* ================= HELPERS ================= */

function randomDelay(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function addCacheBust(url) {
  const separator = url.includes("?") ? "&" : "?";
  return url + separator + "t=" + Date.now() + "-" + Math.floor(Math.random() * 999999);
}

function pickNextUrl(currentIndex) {
  return mainUrls[currentIndex % mainUrls.length];
}

/* ================= FRAME LOAD LOGIC ================= */

function loadTopFrame() {
  const url = pickNextUrl(topIndex);
  topFrame.src = addCacheBust(url);
  topIndex++;
}

function loadBottomFrame() {
  const url = pickNextUrl(bottomIndex);
  bottomFrame.src = addCacheBust(url);
  bottomIndex++;
}

function loadPopupFrame() {
  popupFrame.src = STORE_URL;
  popupWrap.classList.add("is-active");
}

function scheduleTopRefresh() {
  const delay = randomDelay(REFRESH_MIN, REFRESH_MAX);

  topTimer = setTimeout(() => {
    loadTopFrame();
    scheduleTopRefresh();
  }, delay);
}

function scheduleBottomRefresh() {
  const delay = randomDelay(REFRESH_MIN, REFRESH_MAX);

  bottomTimer = setTimeout(() => {
    loadBottomFrame();
    scheduleBottomRefresh();
  }, delay);
}

function startAllFrames() {
  if (hasStarted) return;
  hasStarted = true;

  startReminder.classList.add("is-hidden");

  loadTopFrame();
  loadBottomFrame();
  loadPopupFrame();

  scheduleTopRefresh();
  scheduleBottomRefresh();
}

/* ================= START BUTTON ================= */

startBtn.addEventListener("click", startAllFrames);

/*
  Optional:
  Supaya tombol bisa dipicu dengan Enter/Space saat fokus.
*/
startBtn.addEventListener("keydown", function(event) {
  if (event.key === "Enter" || event.key === " ") {
    event.preventDefault();
    startAllFrames();
  }
});

/* ================= LIGHT SNOW FX ================= */

function startSnowFX() {
  const fx = document.getElementById("fxCanvas");
  const pile = document.getElementById("pileCanvas");
  const ctxFx = fx.getContext("2d");

  let flakes = [];
  let running = true;

  function resize() {
    fx.width = pile.width = window.innerWidth;
    fx.height = pile.height = window.innerHeight;

    const isMobile = window.innerWidth <= 600;
    const amount = isMobile ? 55 : 95;

    flakes = Array.from({ length: amount }, () => ({
      x: Math.random() * fx.width,
      y: Math.random() * fx.height,
      r: Math.random() * 1.8 + 0.8,
      vy: Math.random() * 0.45 + 0.18,
      vx: Math.random() * 0.25 - 0.125,
      alpha: Math.random() * 0.45 + 0.35
    }));
  }

  window.addEventListener("resize", resize, { passive: true });
  resize();

  function tick() {
    if (!running) return;

    ctxFx.clearRect(0, 0, fx.width, fx.height);

    flakes.forEach(f => {
      ctxFx.beginPath();
      ctxFx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
      ctxFx.fillStyle = "rgba(255,255,255," + f.alpha + ")";
      ctxFx.fill();

      f.y += f.vy;
      f.x += f.vx;

      if (f.y > fx.height + 8) {
        f.y = -8;
        f.x = Math.random() * fx.width;
      }

      if (f.x < -8) {
        f.x = fx.width + 8;
      }

      if (f.x > fx.width + 8) {
        f.x = -8;
      }
    });

    requestAnimationFrame(tick);
  }

  tick();

  document.addEventListener("visibilitychange", () => {
    running = !document.hidden;
    if (running) tick();
  });
}

/* ================= INIT ================= */

window.addEventListener("load", () => {
  /*
    Saat halaman load, hanya efek visual yang aktif.
    Iframe utama dan iframe popup tetap kosong sampai user klik tombol.
  */
  startSnowFX();
});
</script>
</body>
</html>
